# Auto-generated Gatus configuration
# This file will be automatically generated by the discovery workflow
# You can manually edit this file initially or let the discovery script generate it

storage:
  type: sqlite
  path: /data/gatus.db

# Web UI configuration
web:
  port: 8080

# Alerting configuration (optional - configure as needed)
# Uncomment and configure when you want to enable alerts
# alerting:
#   slack:
#     webhook-url: "${SLACK_WEBHOOK_URL}"
#     default-alert:
#       enabled: true
#       failure-threshold: 3
#       success-threshold: 2
#       send-on-resolved: true
#       description: "health check failed"

# Endpoints to monitor
# These will be auto-generated by the discovery script
endpoints:
  - name: example-endpoint
    group: production
    url: "https://example.com/"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"

name: Discover Endpoints & Update Gatus Config

on:
  # Manual trigger
  workflow_dispatch:

  # Scheduled trigger (runs weekly on Mondays at 2 AM UTC)
  schedule:
    - cron: '0 2 * * 1'

  # Can also trigger on push to main if you want
  push:
    branches: [main]
    paths:
      - 'scripts/generate-gatus-config.sh'

jobs:
  discover-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Install dependencies
        run: nix shell nixpkgs#jq nixpkgs#omnictl nixpkgs#kubectl

      - name: Run endpoint discovery
        run: |
          chmod +x scripts/generate-gatus-config.sh
          OUTPUT_FILE=config.yaml scripts/generate-gatus-config.sh

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet config.yaml; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in config.yaml"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in config.yaml"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add config.yaml
          git commit -m "Auto-update Gatus config - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push

      - name: Trigger deployment
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: config-updated
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'

      - name: Summary
        run: |
          echo "## Endpoint Discovery Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            echo "Config updated and deployment triggered" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Changes:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git diff HEAD~1 config.yaml | head -50 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes detected in endpoint configuration" >> $GITHUB_STEP_SUMMARY
          fi
